name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64, ext: "" }
          - { goos: linux, goarch: arm64, ext: "" }
          - { goos: darwin, goarch: amd64, ext: "" }
          - { goos: darwin, goarch: arm64, ext: "" }
          - { goos: windows, goarch: amd64, ext: ".exe" }
          - { goos: windows, goarch: arm64, ext: ".exe" }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build web
        working-directory: web
        run: npm ci && npm run build
      - name: Inject web into server (for go:embed)
        run: cp -r web/dist server/dist
      - name: Build agent
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -trimpath -ldflags "-s -w" -o "dist-out/moss-agent-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./agent
      - name: Build server (embed_web)
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: go build -tags embed_web -trimpath -ldflags "-s -w" -o "dist-out/moss-server-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" ./server
      - uses: actions/upload-artifact@v7
        with:
          name: bin-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist-out/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Extract changelog for this tag
        run: |
          awk -v tag="$GITHUB_REF_NAME" '
            $0 ~ "^## " tag "( |$)" { p = 1; next }
            p && /^## / { exit }
            p { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          echo "----- release notes -----"
          cat RELEASE_NOTES.md
      - uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
