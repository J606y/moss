# Moss 反向代理示例（Debian/Ubuntu 系统 nginx；nginx >= 1.25 可用 http2 on）
#
# 前置：
#   1) moss 容器仅绑回环并开启 --trust-proxy：
#        docker run -d --name moss --restart unless-stopped \
#          -p 127.0.0.1:8787:8787 \
#          -e MOSS_ADMIN_PASSWORD=你的强密码 \
#          -v moss-data:/app/data \
#          ghcr.io/j606y/moss:latest \
#          --listen :8787 --data /app/data --trust-proxy
#   2) 域名 A 记录指向本机；证书用 certbot / acme.sh 签发到下方路径。
#
# 关于真实访客 IP（限流 / 登录锁定据此判定，务必配对）：
#   * 本文件用 $proxy_add_x_forwarded_for —— 「追加」当前对端 IP 到 X-Forwarded-For，
#     不要改成覆盖($remote_addr)，否则多层(边缘→回源)拓扑会丢真实访客 IP。
#   * 单层（仅本机一台 nginx 直连 Moss）：到 Moss 的 XFF = 真实访客；--trust-proxy
#     即可，无需 --trusted-proxies（Moss 默认取 XFF 最右段＝本 nginx 追加的访客 IP）。
#   * 多层（访客 → 东京/泰国边缘 nginx → 本机回源 nginx → Moss）：每层都追加，到 Moss
#     的 XFF = [客户端可伪造段...], 真实访客, 边缘公网IP。须给 Moss 加：
#       --trusted-proxies 边缘节点1公网IP,边缘节点2公网IP/或CIDR
#     Moss 会从 XFF 最右往左跳过名单内地址，取第一个非可信地址＝真实访客，
#     攻击者伪造的最左段够不到，无法绕过限流 / 登录锁定。
#
# 放到 /etc/nginx/conf.d/moss.conf，改好 server_name 与证书路径后：nginx -t && systemctl reload nginx

# WebSocket：按 Upgrade 头决定 Connection（moss 的 /api/ws 与 /api/agent/ws 必需）
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name moss.example.com;
    location ^~ /.well-known/acme-challenge/ { root /var/www/acme; } # ACME HTTP-01 验证
    location / { return 301 https://$host$request_uri; }            # 其余一律跳 HTTPS
}

server {
    listen 443 ssl;
    http2 on;
    server_name moss.example.com;

    ssl_certificate     /etc/letsencrypt/live/moss.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/moss.example.com/privkey.pem;

    # 缓存策略由 moss 源站统一下发（assets/* 永久强缓存，index.html 每次校验），
    # 这里只做透传 —— 切勿对 HTML 加 expires / proxy_cache，否则发版后会卡旧版。
    location / {
        proxy_pass http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for; # 追加，勿改覆盖；多层须配 --trusted-proxies（见文件头）
        proxy_set_header X-Forwarded-Proto $scheme;      # moss 据此给 cookie 加 Secure
        proxy_set_header Upgrade           $http_upgrade; # ↓ WebSocket 升级（实时订阅 + agent 上报必需）
        proxy_set_header Connection        $connection_upgrade;
        proxy_read_timeout 3600s;                         # 长连接不被默认 60s 掐断
    }
}
