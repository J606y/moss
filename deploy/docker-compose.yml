# Moss server 部署（阶段5 将在此基础上叠加 nginx + TLS + wss）
# 用法：
#   cd deploy
#   echo 'MOSS_ADMIN_PASSWORD=你的强密码' > .env   # 仅首次初始化生效
#   docker compose up -d            # 拉取 GHCR 镜像启动
#   docker compose up -d --build    # 或本地从源码构建启动
services:
  moss-server:
    image: ghcr.io/j606y/moss:${MOSS_TAG:-latest} # 生产可在 .env 固定 MOSS_TAG=vX.Y.Z 以便回滚
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: moss-server
    restart: unless-stopped
    ports:
      - "8787:8787" # 直连模式。接反向代理后改为仅绑回环： "127.0.0.1:8787:8787"
    environment:
      MOSS_ADMIN_PASSWORD: "${MOSS_ADMIN_PASSWORD:-}" # 仅首次（库无密码）生效，之后忽略
      # 应用层限流（按真实访客 IP，默认开启；设 0 关闭对应层）：
      MOSS_RATELIMIT_PER_MIN: "${MOSS_RATELIMIT_PER_MIN:-600}"          # 全局 /api 每 IP 每分钟
      MOSS_RATELIMIT_AUTH_PER_MIN: "${MOSS_RATELIMIT_AUTH_PER_MIN:-10}" # 登录等敏感端点 每 IP 每分钟
    volumes:
      - moss-data:/app/data # 命名卷，继承镜像内 /app/data 的 nonroot(65532) 属主，免手动 chown
    # 在反代之后启用真实来源 IP（限流/日志按最左 XFF 取真实访客 IP）；同时把上面 ports 改成 127.0.0.1：
    # command: ["--listen", ":8787", "--data", "/app/data", "--trust-proxy"]

volumes:
  moss-data:

